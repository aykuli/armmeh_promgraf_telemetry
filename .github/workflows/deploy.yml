name: CI/CD Production Pipeline

on:
  push:
    branches: [ "master" ]

permissions:
  packages: write
  contents: read

jobs:
  # === ЭТАП 1: ПАРАЛЛЕЛЬНАЯ СБОРКА ОБРАЗОВ ===
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app_name: backend
            context_dir: ./go-projects-group
            docker_file: Dockerfile.backend
          - app_name: bot
            context_dir: ./go-projects-group
            docker_file: Dockerfile.bot
          - app_name: simulator
            context_dir: ./go-projects-group
            docker_file: Dockerfile.simulator
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ${{ matrix.app_name }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context_dir }}
        file: ${{ matrix.context_dir }}/${{ matrix.docker_file }}
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/${{ matrix.app_name }}:latest
          ghcr.io/${{ github.repository }}/${{ matrix.app_name }}:${{ github.sha }}

  # === ЭТАП 2: ДЕПЛОЙ ИНФРАСТРУКТУРЫ ЧЕРЕЗ TERRAFORM ===
  terraform-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terra
    env:
      # Ключи доступа для бакета с tfstate
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Save Yandex Cloud Key
      run: echo '${{ secrets.SERVICE_ACCOUNT_KEY_JSON }}' > key.json

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: >
        terraform apply -auto-approve 
        -var="cloud_id=${{ secrets.YC_CLOUD_ID }}"
        -var="folder_id=${{ secrets.YC_FOLDER_ID }}"
        -var="github_user=${{ github.actor }}"
        -var="github_token=${{ secrets.GITHUB_TOKEN }}"
        -var="github_repo=${{ github.event.repository.name }}"
        -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
        -var="tg_bot_token=${{ secrets.TELEGRAM_BOT_TOKEN }}"
        -var="tg_chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
        -var="mqtt_broker_url=${{ secrets.MQTT_BROKER_URL }}"
        -var="mqtt_user=${{ secrets.MQTT_USER }}"
        -var="mqtt_pass=${{ secrets.MQTT_PASS }}"
        -var="fleet_backend_url=${{ secrets.FLEET_BACKEND_URL }}"
        -var="grafana_admin_pass=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
        -var="grafana_admin_name=${{ secrets.GRAFANA_ADMIN_NAME }}"
        -var="grafana_admin_email=${{ secrets.GRAFANA_ADMIN_EMAIL }}"
        -var="postgres_uri=${{ secrets.POSTGRES_URI }}"
        -var="postgres_db=${{ secrets.POSTGRES_DB }}"
        -var="postgres_user=${{ secrets.POSTGRES_USER }}"
        -var="postgres_pass=${{ secrets.POSTGRES_PASSWORD }}"
        -var="nginx_htpasswd_content=${{ secrets.NGINX_HTPASSWD_CONTENT }}"
