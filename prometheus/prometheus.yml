global:
  scrape_interval: 15s
  evaluation_interval: 15s 
  # scrape_timeout is set to the global default (10s).

remote_write:
  - url: "http://victoriametrics:8428/api/v1/write"
# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  # Мониторинг состояния сервера
  - job_name: node_exporter
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Мониторинг базы данных PostgreSQL
  - job_name: postgres_exporter
    static_configs:
      - targets: ["host.docker.internal:9187"]

  # Мониторинг Backend API (FMS / Телематика)
  - job_name: fms_backend
    static_configs:
      - targets: ['host.docker.internal:8080']

    # Сбор телеметрии с транспорта через MQTT Exporter
  - job_name: vehicles
    static_configs:
      - targets: ["mqtt-exporter:9641"]
    metric_relabel_configs:
      - source_labels: [__name__, topic]
        # Matches: mqtt_anyname;vehicle_type/fuel_type/vehicle_id/telemetry
        regex: "^(mqtt_[^;]+);([^/]+)/([^/]+)/([^/]+)/telemetry$"
        target_label: vehicle_type
        replacement: "${2}"
        action: replace

      - source_labels: [__name__, topic]
        regex: "^(mqtt_[^;]+);([^/]+)/([^/]+)/([^/]+)/telemetry$"
        target_label: fuel_type
        replacement: "${3}"
        action: replace

      - source_labels: [__name__, topic]
        regex: "^(mqtt_[^;]+);([^/]+)/([^/]+)/([^/]+)/telemetry$"
        target_label: vehicle_id
        replacement: "${4}"
        action: replace

      - regex: "^sensor$"
        action: labeldrop

  # Мониторинг самого Prometheus
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "prometheus"

