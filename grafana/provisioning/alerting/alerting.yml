apiVersion: 1

contactPoints:
  - name: Telegram Bot Alert
    receivers:
      - uid: telegram_bot
        type: telegram
        settings:
          bottoken: ${BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          message: '{{ template "aynurs_tg_template" . }}'
  - name: "Email Alert"
    receivers:
      - uid: "email_receiver"
        type: "email"
        settings:
          # Можно указать несколько адресов через запятую
          addresses: "aykuli@ya.ru"
          singleEmail: false

policies:
  - orgId: 1
    receiver: "Email Alert" 
    groupVariables: ["alertname", "vehicle_id"]
    groupWait: "10s"
    groupInterval: "30s"
    repeatInterval: "2h"
    # дочерние маршруты
    routes:
      - receiver: "Telegram Bot Alert"
        continue: true 
# @note
# https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
groups:
  - orgId: 1
    name: "Robot Alerts"
    folder: "Telemetry"
    interval: 10s
    rules:
      # 🔴 Перегрев бортового управляющего процессора CPU (>85°C)
      - uid: mqtt_robot_temp_cpu_c
        title: "🔴 Перегрев ЦПУ робота"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P4169E866C3094E38
            model:
              editorMode: code
              expr: mqtt_robot_temp_cpu_c{vehicle_type="robot"}
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                  - evaluator:
                      params:
                          - 85
                      type: gt
                    operator:
                      type: and
                    query:
                      params:
                          - C
                    reducer:
                      params: []
                      type: last
                    type: query
              datasource:
                  type: __expr__
                  uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
# todo summary description for alerts
        dashboardUid: park_state
        panelId: 12
        noDataState: NoData
        execErrState: Error
        for: 10s
        annotations:
          __dashboardUid__: park_state
          __panelId__: "12"
        labels:
          severity: critical
          vehicle_type: robot
        isPaused: false
        notification_settings:
          receiver:  Telegram Bot Alert

      # 🟠 Падение уровня сигнала связи LTE (RSSI ниже -85 dBm)
      - uid: mqtt_robot_lte_rssi
        title: "🟠 Падение уровня сигнала связи LTE (RSSI ниже -85 dBm)"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
