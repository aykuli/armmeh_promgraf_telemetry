networks:
  monitoring:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - '9090:9090'
    networks:
      - monitoring
    
  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: mosquitto
    ports:
      - '1883:1883'
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - monitoring
    restart: unless-stopped

  mqtt-exporter:
    image: ghcr.io/hikhvar/mqtt2prometheus:v0.1.8-RC2
    container_name: mqtt_exporter
    volumes:
      - ./mqtt2prometheus/config:/config
      - ./mqtt2prometheus/cache:/var/lib/mqtt2prometheus
    command:
      - '-config=/config/config.yml'
    ports:
      - '9641:9641'
    entrypoint:
      - /mqtt2prometheus
      - -log-level=debug
    networks:
      - monitoring
    environment:
      - MQTT2PROM_MQTT_USER=${MQTT2PROM_MQTT_USER}
      - MQTT2PROM_MQTT_PASSWORD=${MQTT2PROM_MQTT_PASSWORD}
    depends_on:
      - mosquitto
      - prometheus

