networks:
  monitoring:
    driver: bridge
volumes:
  mqtt2prometheus_cache:
  prometheus_data:
  victoria_metrics_data:
  grafana_data:
  postgres_data:

services:
  # здесь будет сервис, котрый имитирует устройства
  # может  и бот сюда положу

  park-simulator:
    build:
      context: ./go-projects-group
      dockerfile: Dockerfile.simulator
    image: sim:v0.0.1 # my local image to test
    container_name: park_simulator
    networks:
      - monitoring
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL}
  backend:
    build:
      context: ./go-projects-group
      dockerfile: Dockerfile.backend
    image: backend:v0.0.1
    container_name: backend
    ports:
      - "8080:8080"
    networks:
      - monitoring
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL}
      - FLEET_BACKEND_URL=${FLEET_BACKEND_URL}
      - POSTGRES_DSN=${POSTGRES_DSN}
  bot:
    build:
      context: ./go-projects-group
      dockerfile: Dockerfile.bot
    image: bot:v0.0.1
    container_name: bot
    networks:
      - monitoring
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

  # --- БРОКЕР ОЧЕРЕДИ СООБЩЕНИЙ ---
  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: mosquitto
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/log:/mosquitto/log
    ports:
      - '1883:1883'
    networks:
      - monitoring
    restart: unless-stopped

  # --- MQTT -> PROMETHEUS ---
  mqtt-exporter:
    image: ghcr.io/hikhvar/mqtt2prometheus:v0.1.8-RC2
    container_name: mqtt_exporter
    volumes:
      - ./mqtt2prometheus/config:/config
      - mqtt2prometheus_cache:/var/lib/mqtt2prometheus
    command:
      - '-config=/config/config.yml'
    ports:
      - '9641:9641'
    entrypoint:
      - /mqtt2prometheus
      - -log-level=debug
    networks:
      - monitoring
    environment:
      - MQTT2PROM_MQTT_USER=${MQTT_USER}
      - MQTT2PROM_MQTT_PASSWORD=${MQTT_PASS}
    depends_on:
      - mosquitto

  # --- NODE DATA -> PROMETHEUS ---
  node-exporter:
    image: prom/node-exporter:master
    container_name: node_exporter
    pid: host          # Without pid: host, Node Exporter cannot inspect processes running directly on your host machine
    network_mode: host # Gives Node Exporter access to real host interfaces (eth0, wlan0, etc.)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  # --- МОНИТОРИНГ И СБОР МЕТРИК ---
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
    ports:
     - '9090:9090'
    networks:
      - monitoring
    extra_hosts: ["host.docker.internal:host-gateway"] # for node-exporter service

  # --- ДОЛГОСРОЧНОЕ ХРАНИЛИЩЕ МЕТРИК ---
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    container_name: victoria_metrics
    ports:
      - '8428:8428'
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
    networks:
      - monitoring
    restart: unless-stopped

  postgres-db:
    image: postgres:17-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped


  # --- МОНИТОРИНГ БАЗЫ ДАННЫХ ПОТСГРЕС ---
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    network_mode: host
    environment:
      - DATA_SOURCE_URI=${POSTGRES_URI}
      - DATA_SOURCE_USER=${POSTGRES_USER}
      - DATA_SOURCE_PASS=${POSTGRES_PASSWORD}
    restart: unless-stopped

  # --- ВИЗУАЛИЗАЦИЯ И КАРТЫ ---
  grafana:
    image: grafana/grafana:11.6.15-ubuntu
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
      - ./grafana/config/grafana.ini:/etc/grafana/config/grafana.ini:ro
    ports:
     - '3000:3000'
    extra_hosts:
      - "host.docker.internal:host-gateway" # Для вебхуков на http://docker.internal
    networks:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_NAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_ALERTS_ALLOW_LOCAL_MODE_NOTIFIER=true
      - GF_SMTP_ENABLED=false
      - GF_SMTP_HOST=smtp.yandex.ru:465
      - GF_SMTP_USER=${GRAFANA_ADMIN_EMAIL}
      - GF_SMTP_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME}
      - GF_SMTP_SKIP_VERIFY=false
    depends_on:
      - prometheus
      - victoriametrics
    restart: unless-stopped
